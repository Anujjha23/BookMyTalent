# render.yaml — Deploy ARTWAVE on Render.com (free tier)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: artwave-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://artwave.onrender.com
