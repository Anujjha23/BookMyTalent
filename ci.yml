name: ARTWAVE CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Test Backend ──
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Check health endpoint starts
        run: |
          node server.js &
          sleep 3
          curl --fail http://localhost:5000/api/health || exit 1
          kill %1
        env:
          PORT: 5000
          JWT_SECRET: test_secret_for_ci
          NODE_ENV: test

  # ── Deploy to Render (on main push) ──
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || echo "Deploy hook not configured — skipping"
